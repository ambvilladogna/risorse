<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <!-- Shared CSS -->
    <link rel="stylesheet" href="{{ site.baseurl }}/shared/css/variables.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/shared/css/reset.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/shared/css/layout.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/shared/css/components.css">

    <!-- Page-specific CSS -->
    {% if page.extra_css %}
    <link rel="stylesheet" href="{{ site.baseurl }}/css/{{ page.extra_css }}.css">
    {% endif %}
</head>

<body>
    {% include homeHeader.html %}

    {{ content }}

    {% include footer.html %}

    <script src="{{ site.baseurl }}/shared/js/common.js"></script>
</body>

</html>
