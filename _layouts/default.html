<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <!-- Shared CSS -->
    <link rel="stylesheet" href="{{ site.baseurl }}/shared/css/variables.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/shared/css/reset.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/shared/css/layout.css">
    <link rel="stylesheet" href="{{ site.baseurl }}/shared/css/components.css">

    {% include asset-css.html list=page.css %}
    {% include asset-js.html list=page.scripts.head %}
</head>

<body id="top">
    {% include header.html %}

    {{ content }}

    {% include footer.html %}

    <script src="{{ site.baseurl }}/shared/js/common.js"></script>
    {% include asset-js.html list=page.scripts.body %}
</body>

</html>
